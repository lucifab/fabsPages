version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20.20.0  # Specify the Node.js version
        - nvm use 20.20.0
        - npm install
    build:
      commands:
        - npm run build:prod  # This will run the Angular build
  artifacts:
    baseDirectory: dist/fabs-page/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
